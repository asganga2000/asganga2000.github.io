{{ $page := .wcPage }}
{{ $block := .wcBlock }}
{{ $autolink := default true $block.content.autolink }}
{{ $data := $block.content }}

<div class="col-12 col-lg-8">
  {{ with $block.content.text }}{{ . | emojify | markdownify }}{{ end }}

  {{ if $data.form.provider }}
  <div class="mb-3">
    <!-- Web3Forms Contact Form -->
    <form action="https://api.web3forms.com/submit" method="POST" id="web3forms-contact">
      <!-- IMPORTANT: Replace with your actual Web3Forms access key -->
      <input type="hidden" name="access_key" value="{{ $data.form.formspree.id }}">
      
      <!-- Spam protection -->
      <input type="hidden" name="subject" value="New Contact Form Submission from Portfolio">
      <input type="checkbox" name="botcheck" style="display: none;">
      
      <!-- Success redirect (optional) -->
      <input type="hidden" name="redirect" value="{{ $page.Site.BaseURL }}">
      
      <div class="form-group form-inline">
        <label class="sr-only" for="inputName">Name</label>
        <input type="text" name="name" class="form-control w-100" id="inputName" placeholder="Name" required>
      </div>
      
      <div class="form-group form-inline">
        <label class="sr-only" for="inputEmail">Email</label>
        <input type="email" name="email" class="form-control w-100" id="inputEmail" placeholder="Email" required>
      </div>
      
      <div class="form-group">
        <label class="sr-only" for="inputMessage">Message</label>
        <textarea name="message" class="form-control" id="inputMessage" rows="5" placeholder="Message" required></textarea>
      </div>
      
      <button type="submit" class="btn btn-primary px-3 py-2">Send</button>
      
      <div id="form-status" style="margin-top: 15px;"></div>
    </form>

    <script>
      // Override HugoBlox's form handling
      const form = document.getElementById('web3forms-contact');
      
      form.addEventListener('submit', async function(e) {
        e.preventDefault();
        e.stopPropagation();
        
        const formData = new FormData(form);
        const statusDiv = document.getElementById('form-status');
        
        try {
          const response = await fetch('https://api.web3forms.com/submit', {
            method: 'POST',
            body: formData
          });
          
          const data = await response.json();
          
          if (data.success) {
            statusDiv.innerHTML = '<div class="alert alert-success">Thank you! Your message has been sent successfully.</div>';
            form.reset();
          } else {
            statusDiv.innerHTML = '<div class="alert alert-danger">Oops! Something went wrong. Please try again.</div>';
          }
        } catch (error) {
          statusDiv.innerHTML = '<div class="alert alert-danger">Error submitting form. Please try again.</div>';
        }
        
        return false;
      }, true);
    </script>
  </div>
  {{ end }}
</div>
